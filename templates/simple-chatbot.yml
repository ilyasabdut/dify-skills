version: "0.6.0"
kind: "app"
app:
  name: "Simple Chatbot"
  mode: "advanced-chat"
  icon: "💬"
  icon_background: "#E4FBCC"
  description: "A simple conversational chatbot"
dependencies: []
workflow:
  graph:
    nodes:
      - id: "start"
        type: custom
        position: {x: 80, y: 282}
        sourcePosition: right
        targetPosition: left
        data:
          type: start
          title: Start
          variables: []
      - id: "llm"
        type: custom
        position: {x: 380, y: 282}
        sourcePosition: right
        targetPosition: left
        data:
          type: llm
          title: LLM
          model:
            provider: openai
            name: gpt-4o-mini
            mode: chat
            completion_params:
              temperature: 0.7
          prompt_template:
            - role: system
              text: "You are a helpful, friendly assistant. Answer questions clearly and concisely."
            - role: user
              text: "{{#sys.query#}}"
          memory:
            enabled: true
            window:
              enabled: true
              size: 10
          context:
            enabled: false
          vision:
            enabled: false
      - id: "answer"
        type: custom
        position: {x: 680, y: 282}
        sourcePosition: right
        targetPosition: left
        data:
          type: answer
          title: Answer
          answer: "{{#llm.text#}}"
    edges:
      - id: "start-llm"
        source: "start"
        sourceHandle: "source"
        target: "llm"
        targetHandle: "target"
      - id: "llm-answer"
        source: "llm"
        sourceHandle: "source"
        target: "answer"
        targetHandle: "target"
  features:
    opening_statement: "Hello! How can I help you today?"
    suggested_questions:
      - "What can you help me with?"
      - "Tell me about yourself"
    suggested_questions_after_answer:
      enabled: true
  environment_variables: []
  conversation_variables: []
